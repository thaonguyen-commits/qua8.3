

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8/3 Rực Rỡ Cho Người Thương</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink-pastel: #ffdeeb;
            --pink-medium: #f8bbd0;
            --pink-dark: #f06292;
            --white-soft: #fffafa;
            --text-color: #880e4f;
            --sakura-color: #ffb7c5;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Quicksand', sans-serif;
            background: var(--pink-pastel);
        }

        /* NỀN GRADIENT PASTEL */
        .screen {
            position: fixed; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        #screen1 {
            background: linear-gradient(135deg, #fff5f8 0%, #ffdeeb 100%);
        }

        .hidden { opacity: 0; transform: scale(1.2); pointer-events: none; }

        /* ICON QUÀ TẶNG THAY CHO QR */
        .gift-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: floating 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(240, 98, 146, 0.3));
        }

        /* NÚT BẤM */
        .btn-magic {
            margin-top: 40px; padding: 15px 40px;
            font-size: 1.1rem; font-weight: 500;
            color: white; border: none; border-radius: 50px;
            background: linear-gradient(45deg, #f06292, #f48fb1);
            cursor: pointer; transition: 0.4s;
            box-shadow: 0 8px 20px rgba(240, 98, 146, 0.3);
            letter-spacing: 1px;
            z-index: 100;
        }

        .btn-magic:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 25px rgba(240, 98, 146, 0.4);
        }

        /* MÀN HÌNH 2 */
        #screen2 {
            background: linear-gradient(to top, #fff1f2 0%, #ffd1dc 100%);
        }

        .message-box {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            padding: 40px; border-radius: 40px;
            width: 85%; max-width: 450px; text-align: center;
            color: var(--text-color); z-index: 20;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .message-box h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--pink-dark);
            font-size: 3rem; margin-bottom: 15px;
        }

        /* HIỆU ỨNG TRÁI TIM BAY */
        .bg-heart {
            position: absolute; color: rgba(240, 98, 146, 0.2);
            font-size: 20px; pointer-events: none;
            animation: moveUp 6s linear infinite;
        }

        /* HIỆU ỨNG HOA ANH ĐÀO */
        .sakura {
            position: fixed;
            top: -10%;
            background-color: var(--sakura-color);
            border-radius: 100% 0 100% 0;
            opacity: 0.7;
            pointer-events: none;
            z-index: 15;
            animation: fall linear infinite;
        }

        /* HIỆU ỨNG CHUỘT LẤP LÁNH */
        .sparkle {
            position: fixed; pointer-events: none;
            width: 8px; height: 8px; background: #f06292;
            border-radius: 50%; animation: sparkleAnim 0.8s forwards;
            z-index: 999;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes moveUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fall {
            0% { top: -10%; transform: translateX(0) rotate(0deg); }
            100% { top: 110%; transform: translateX(100px) rotate(360deg); }
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="screen1" class="screen">
        <div class="gift-icon">🎁</div>
        <h2 style="color: var(--text-color); margin-top: 10px; font-weight: 300; letter-spacing: 3px; text-align: center;">HAPPY WONMEN'S DAY </h2>
        <button class="btn-magic" onclick="openGift()">Nhấn để mở quà 🌸</button>
    </div>

    <div id="screen2" class="screen hidden">
        <div id="heart-container"></div>
        <div class="message-box">
            <h1>Happy Women's Day 8/3! 💐</h1>
            <p style="font-size: 1.1rem; line-height: 1.6; color: #5d4037;">
            "Gửi những lời chúc tốt đẹp nhất từ phương xa. Chúc chị em phụ nữ  một ngày tràn đầy hoa và quà, luôn là người phụ nữ xinh đẹp nhất!"
            </p>
            <p style="font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: var(--pink-dark); margin: 20px 0;">
                hAPPY WONMEN'S DAY  ❤️
            </p>
            <button class="btn-magic" onclick="finalSurprise()">Click để nhận ngàn tim ✨</button>
        </div>
    </div>

    <audio id="music" src="c:\Users\HP\Downloads\SaveTik.io_7581135137748929800.mp3" loop></audio>

    <script>
        // 1. Hiệu ứng chuột lấp lánh
        document.addEventListener('mousemove', (e) => {
            for(let i=0; i<2; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = (e.pageX + Math.random()*10 - 5) + 'px';
                sparkle.style.top = (e.pageY + Math.random()*10 - 5) + 'px';
                sparkle.style.background = `hsl(${330 + Math.random()*30}, 100%, 80%)`;
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 800);
            }
        });

        // 2. Hàm tạo trái tim bay
        function createHearts() {
            const container = document.getElementById('heart-container');
            const icons = ['🌸', '❤️', '🎀', '✨', '💖','💖','🫰🏻','🍃','🌟'];
            const heart = document.createElement('div');
            heart.className = 'bg-heart';
            heart.innerHTML = icons[Math.floor(Math.random()*icons.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }

        // 3. Hàm tạo hoa anh đào rơi
        function createSakura() {
            const sakura = document.createElement('div');
            sakura.className = 'sakura';
            const size = Math.random() * 12 + 8 + 'px';
            sakura.style.width = size;
            sakura.style.height = size;
            sakura.style.left = Math.random() * 100 + 'vw';
            sakura.style.opacity = Math.random() * 0.6 + 0.4;
            const duration = Math.random() * 5 + 5 + 's';
            sakura.style.animationDuration = duration;
            document.body.appendChild(sakura);
            setTimeout(() => sakura.remove(), 10000);
        }

        // 4. Hàm mở quà
        function openGift() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#f48fb1', '#ffc1e3', '#ffffff']
            });

            setTimeout(() => {
                document.getElementById('screen1').classList.add('hidden');
                document.getElementById('screen2').classList.remove('hidden');
                
                const audio = document.getElementById('music');
                audio.play().catch(e => console.log("Cần tương tác để phát nhạc"));

                setInterval(createHearts, 300); 
                setInterval(createSakura, 200); 
            }, 600);
        }

        // 5. Hiệu ứng bùng nổ cuối cùng
        function finalSurprise() {
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();
              if (timeLeft <= 0) return clearInterval(interval);

              var particleCount = 50 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { 
                particleCount, 
                origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                colors: ['#f06292', '#ffdde1']
              }));
              confetti(Object.assign({}, defaults, { 
                particleCount, 
                origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                colors: ['#f06292', '#ffdde1']
              }));
            }, 250);
        }
    </script>
</body>
</html>
